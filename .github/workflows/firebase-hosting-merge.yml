name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main # Cambia a 'master' si tu rama principal se llama así

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm ci

      - name: Construir el proyecto
        run: npm run build

      - name: Autenticación en Google Cloud (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/459753165749/locations/global/workloadIdentityPools/github/providers/github'
          service_account: 'firebase-adminsdk-fbsvc@project-ccb31ac7-2f69-4bf5-b7f.iam.gserviceaccount.com'
          token_format: 'access_token' # CRÍTICO: Pedimos un token de acceso directo

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Desplegar a Firebase Hosting
        run: firebase deploy --only hosting --project project-ccb31ac7-2f69-4bf5-b7f
        env:
          FIREBASE_TOKEN: ${{ steps.auth.outputs.access_token }} # Pasamos el token directamente a Firebase
