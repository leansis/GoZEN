name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          workload_identity_provider: 'projects/459753165749/locations/global/workloadIdentityPools/github/providers/github'
    service_account: 'github-action-1198362016@project-ccb31ac7-2f69-4bf5-b7f.iam.gserviceaccount.com'
          
